<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0ABAB5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="小猫消费" />
  <title>小猫消费</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="container">
    <header class="appHeader">
      <div class="logoBadge" aria-hidden="true">🐱</div>
      <div>
        <h1>小猫消费</h1>
        <p class="subtitle">两人共享 · 现金 / 卡 · 明细同步</p>
      </div>
    </header>

    <section id="setupWarning" class="card warning hidden">
      <strong>还没有配置 Supabase。</strong>
      <p>请打开 <code>app.js</code>，填写 <code>SUPABASE_URL</code> 和 <code>SUPABASE_KEY</code> 后再发布。</p>
    </section>

    <section id="loginBox" class="card">
      <h2>登录</h2>
      <p class="hint">输入被允许使用的邮箱，系统会发送登录链接。</p>
      <input id="emailInput" type="email" inputmode="email" autocomplete="email" placeholder="邮箱" />
      <button id="loginBtn">发送登录链接</button>
      <p id="loginMsg" class="msg"></p>
    </section>

    <section id="appBox" class="hidden">
      <div class="userBar card smallCard">
        <div>
          <div class="hint">当前用户</div>
          <div id="userEmail" class="userEmail"></div>
        </div>
        <button id="logoutBtn" class="ghostBtn">退出</button>
      </div>

      <div class="tabs" role="tablist" aria-label="钱包类型">
        <button id="cashTab" class="tab active" type="button">现金</button>
        <button id="cardTab" class="tab" type="button">卡</button>
      </div>

      <section class="balanceCard">
        <div id="walletTitle" class="walletTitle">现金余额</div>
        <div id="balanceValue" class="balanceValue">0.00</div>
      </section>

      <div class="actions">
        <button id="addRechargeBtn" type="button">+ 充值</button>
        <button id="addTransferBtn" type="button">+ 划账</button>
        <button id="deleteSelectedBtn" class="danger" type="button">删除选中</button>
      </div>

      <section id="recordsList" class="records" aria-live="polite"></section>
    </section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modalBox">
      <div class="modalHeader">
        <h2 id="modalTitle">新增明细</h2>
        <button id="closeModalBtn" class="iconBtn" type="button" aria-label="关闭">×</button>
      </div>

      <label>
        类型
        <select id="formType">
          <option value="recharge">充值</option>
          <option value="transfer">划账 / 扣费</option>
        </select>
      </label>

      <label>
        金额
        <input id="formAmount" type="number" inputmode="decimal" step="0.01" placeholder="例如 20.50" />
      </label>

      <label>
        用途
        <input id="formPurpose" type="text" placeholder="例如 买菜 / 地铁 / 现金充值" />
      </label>

      <label>
        备注
        <textarea id="formNote" rows="3" placeholder="可不填"></textarea>
      </label>

      <div class="modalActions">
        <button id="saveBtn" type="button">保存</button>
        <button id="cancelBtn" class="secondary" type="button">取消</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
